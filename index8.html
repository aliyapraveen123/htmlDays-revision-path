<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Travel Blog</title>
    </head>
    
    <body>
        <fieldset>
            <legend>Job Application Form:------</legend>

                <label for="Name">Name:</label><br>
                <input 
                   type="text" 
                   id="Name" 
                   placeholder="First-Name" 
                   name="First-Name"
                   required>
                <input
                   type="text" 
                   id="Name" 
                   placeholder="Last-Name"
                   name="Last-Name" 
                   required><br><br>
                
                <label for="DOB">Date-of-Birth</label><br>
                <input 
                  type="Date" 
                  id="DOB"
                  placeholder="Date-of-Birth"><br><br>
                
                <label for="Mobile-no.">Mobile No.:</label><br>
                 <input
                    type="text" 
                    value="+91"
                    readonly
                    >

                 <input
                   type="tel"
                   id="Mobile-no."
                   name="mobile-no."
                   placeholder="9876543210"
                   pattern="[0-9]{10}"
                   required><br><br>

                <label for="email-id">Email id:</label><br> 
                <input
                  type="email"
                  id="email-id"
                  placeholder="email-id"
                  name="email-id"
                  required><br><br>
                
                <label for="Password">Password:</label><br>
                <input
                  type="password"
                  id="Password"
                  placeholder=" Enter password"
                  name="password"
                  minlength="3"
                  maxlength="6"
                  required><br><br>
                
                <p>Gender:</p>

                <input
                  type="radio"
                  value="Male"
                  name="Gender">
                <label for="Male">Male</label>

                <input
                  type="radio"
                  value="Female"
                  name="Gender">
                <label for="Female">Female</label>

                <p>Applied Position</p>

                <input
                  type="Checkbox"
                  value="Frontend"
                  name="Applied Position">
                <label for="Applied Position">Frontend-Developer</label><br>
                
                <input
                  type="Checkbox"
                  value="backend"
                  name="Applied Position">
                <label for="Applied Position">Backend-Developer</label><br>

                <input
                  type="Checkbox"
                  value="MERN Stack"
                  name="Applied Position">
                <label for="Applied Position">MERN Stack</label><br>

                <input
                  type="Checkbox"
                  value="Data Analyst"
                  name="Applied Position"
                  disabled>
                <label for="Applied Position">Data Analyst</label><br><br>
                

               <label for="Resume">Resume:</label><br>
               <input type="file" id="Resume" name="resume"><br><br>

               <label for="other-document">Any Other Document to Upload:</label><br>
               <input type="file" id="other-document" name="other-document"><br><br>

               <label for="Address">Address:</label><br>
               <textarea id="Address" name="Address" rows="4" cols="20"></textarea><br><br>
               
               
               <input type="Submit" value="Submit">
            </form>
        </fieldset>

    </body>
</html>
